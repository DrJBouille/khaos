<div class="w-screen h-screen flex gap-4 p-4 bg-gray-50">

  <div class="border border-zinc-200 rounded-xl p-3 shadow-sm bg-white flex flex-col gap-3">
    @for (route of routes; track route.name) {
      <a
        routerLink="{{route.link}}"
        routerLinkActive="bg-gray-100 text-blue-600"
        class="flex flex-col items-center w-16 aspect-square justify-center rounded-lg font-medium transition hover:bg-gray-100"
      >
        <ng-icon name="{{route.icon}}" size="24"></ng-icon>
        <span class="text-sm mt-1">{{route.name}}</span>
      </a>
    }
  </div>

  <div class="flex-1 border border-zinc-200 rounded-xl p-4 shadow-sm bg-white">
    <router-outlet></router-outlet>
  </div>

</div>
